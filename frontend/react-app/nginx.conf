# nginx config for serving a React SPA (Single Page Application).
#
# The key problem: React Router handles routing in the browser (client-side).
# When you visit /jobs directly, nginx tries to find a file at /jobs — it doesn't exist.
# `try_files $uri $uri/ /index.html` fixes this:
#   1. Try the exact URI ($uri) — works for /assets/main.js etc.
#   2. Try it as a directory ($uri/) — rarely needed for SPAs.
#   3. Fall back to /index.html — React loads, Router takes over, correct page renders.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html so users always get the latest app version.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Static assets (JS, CSS, images) can be cached aggressively.
    # Vite fingerprints filenames (e.g. main.a3f2c1.js) so stale cache is never an issue.
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
